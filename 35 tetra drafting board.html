<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>35 · Tetra Drafting Board — Cross-Slit Construction</title>
<style>
  :root{
    --paper:#f3efe4; --ink:#22201c; --table:#2e2a24; --tray-ink:#efe9da;
    --tray-dim:#bdb4a1; --tray-line:#6b6353; --accent:#e0a51e;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0; height:100dvh; display:flex; flex-direction:column;
    background:var(--table);
    font-family:"Avenir Next","Futura","Century Gothic","Trebuchet MS",sans-serif;
    -webkit-user-select:none; user-select:none;
  }
  #sheetwrap{flex:1; min-height:0; display:flex; align-items:center;
    justify-content:center; padding:10px;}
  canvas{background:var(--paper); border-radius:2px; touch-action:none;
    box-shadow:0 10px 30px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.06) inset;}
  #tray{
    background:var(--table); color:var(--tray-ink);
    border-top:1px solid #423c33;
    padding:9px 14px calc(9px + env(safe-area-inset-bottom));
    display:flex; flex-wrap:wrap; gap:8px 16px; align-items:center;
    font:11px/1.35 ui-monospace,Menlo,Consolas,monospace;
  }
  .lab{letter-spacing:.16em; text-transform:uppercase; font-size:9px;
    color:var(--tray-dim); font-family:inherit;}
  .ctl{display:flex; align-items:center; gap:7px}
  input[type=range]{width:104px; accent-color:var(--accent)}
  .val{min-width:3.2em; text-align:right; color:var(--tray-ink)}
  .chip{
    font:inherit; letter-spacing:.14em; text-transform:uppercase; font-size:9px;
    border:1px solid var(--tray-line); background:transparent; color:var(--tray-ink);
    padding:5px 10px; border-radius:2px; cursor:pointer;
  }
  .chip[aria-pressed="true"]{background:var(--tray-ink); color:var(--table);
    border-color:var(--tray-ink);}
  .chip:focus-visible, input:focus-visible{outline:2px solid var(--accent);
    outline-offset:2px;}
  #readout{margin-left:auto; color:var(--tray-dim)}
  #readout b{color:var(--tray-ink); font-weight:600}
  @media (max-width:640px){ input[type=range]{width:76px} #readout{width:100%} }
</style>
</head>
<body>
<div id="sheetwrap"><canvas id="sheet" aria-label="Drafting sheet: plan, elevation, transfer and cross-slit construction"></canvas></div>
<div id="tray">
  <span class="ctl"><span class="lab">Zv&nbsp;red</span>
    <input id="sZv" type="range" min="60" max="240" step="1" value="150">
    <span class="val" id="vZv">150</span></span>
  <span class="ctl"><span class="lab">Zh&nbsp;blue</span>
    <input id="sZh" type="range" min="61" max="330" step="1" value="250">
    <span class="val" id="vZh">250</span></span>
  <span class="ctl"><span class="lab">Screen</span>
    <input id="sC" type="range" min="-50" max="300" step="1" value="0">
    <span class="val" id="vC">0</span></span>
  <span class="ctl"><span class="lab">Near</span>
    <input id="sNear" type="range" min="340" max="640" step="5" value="360">
    <span class="val" id="vNear">360</span></span>
  <span class="ctl"><span class="lab">Far</span>
    <input id="sFar" type="range" min="420" max="700" step="5" value="660">
    <span class="val" id="vFar">660</span></span>
  <button class="chip" id="cTrace" aria-pressed="true">Trace</button>
  <button class="chip" id="cSweep" aria-pressed="false">Sweep</button>
  <button class="chip" id="cPin" aria-pressed="false">Pinhole</button>
  <button class="chip" id="cAsym" aria-pressed="true">Asymptotes</button>
  <button class="chip" id="cLab" aria-pressed="true">Labels</button>
  <button class="chip" id="cGrid" aria-pressed="true">Grid</button>
  <span id="readout"></span>
</div>
<noscript>This sheet needs JavaScript.</noscript>

<script>
/* ============================================================
   TetraMath — closed forms, exposed for the headless check
   (check_drafting_board.js, Check J). Rig convention: screen
   plane z = c; red slit l1 vertical at z = Zv; blue slit l2
   horizontal at z = Zh; scene beyond both slits.
   ============================================================ */
(function(){
  function project(P, c, Zv, Zh){
    return { X: P.x * (c - Zv) / (P.z - Zv),
             Y: P.y * (c - Zh) / (P.z - Zh) };
  }
  function crossRatio(A,B,C,D){ return ((C-A)*(D-B))/((C-B)*(D-A)); }
  function feet(P, Zv, Zh){
    return { yf: P.y*(Zv-Zh)/(P.z-Zh),   /* red foot (height on l1)   */
             xf: P.x*(Zh-Zv)/(P.z-Zv) }; /* blue foot (abscissa on l2) */
  }
  var TM = { project: project, crossRatio: crossRatio, feet: feet };
  if (typeof window !== 'undefined') window.TetraMath = TM;
})();

(function(){
if (typeof document === 'undefined') return;

/* ---------------- palette (matches Kevin's sheets) ---------------- */
var INK='#22201c', RED='#c8352b', BLUE='#1f4fd8', YEL='#d99e14',
    PUR='#7a3fa8', ORG='#e07020', PAPER='#f3efe4';
var inkA=function(a){return 'rgba(34,32,28,'+a+')';};
var redA=function(a){return 'rgba(200,53,43,'+a+')';};
var bluA=function(a){return 'rgba(31,79,216,'+a+')';};

/* ---------------- state ---------------- */
var S = {
  Zv:150, Zh:250, c:0,
  near:360, far:660, halfW:100, halfH:50,
  trace:{x:100, y:50, z:470},
  showTrace:true, sweep:false, sweepU:0, sweepDone:false,
  showPin:false, showAsym:true, showLab:true, showGrid:true
};
var reduceMotion = window.matchMedia &&
  window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------------- projection helpers ---------------- */
var TM = window.TetraMath;
function proj(P){ return TM.project(P, S.c, S.Zv, S.Zh); }
function projPin(P){ var Zp=(S.Zv+S.Zh)/2;
  var m=(S.c-Zp)/(P.z-Zp); return {X:P.x*m, Y:P.y*m}; }
function depthCurve(x,y,z0,z1,N){
  var out=[], i, z;
  for(i=0;i<N;i++){ z=z0+(z1-z0)*i/(N-1); out.push(proj({x:x,y:y,z:z})); }
  return out;
}

/* ---------------- sheet layout ----------------
   world extents: x in [-150,150], y in [-150,150], z in [-60,720]
   uniform scale k; quadrants share the interior junction so the
   45-degree transfer is exact.                                     */
var cv=document.getElementById('sheet'), ctx=cv.getContext('2d');
if(!ctx) return;
var dpr=1, L={};   /* layout cache */
function layout(){
  var wrap=document.getElementById('sheetwrap');
  var cw=wrap.clientWidth-20, ch=wrap.clientHeight-20;
  if(cw<100||ch<100){ cw=880; ch=880; }   /* headless / zero-layout guard */
  dpr=Math.min(window.devicePixelRatio||1,3);
  var k=Math.min(cw/1080, ch/1080);
  var W=1080*k, H=1080*k;
  cv.width=Math.round(W*dpr); cv.height=Math.round(H*dpr);
  cv.style.width=W+'px'; cv.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  L.k=k; L.ox=0; L.oy=0;
  L.colX = 300*k;            /* junction x (plan|transfer, constr|side) */
  L.rowY = 780*k;            /* junction y (top row | bottom row)       */
  L.W=W; L.H=H;
  L.fx  = function(x){ return (x+150)*k; };            /* plan x, image X */
  L.fzP = function(z){ return L.rowY-(z+60)*k; };      /* plan z (up)     */
  L.fzS = function(z){ return L.colX+(z+60)*k; };      /* side z (right)  */
  L.fy  = function(y){ return L.rowY+(150-y)*k; };     /* side y, image Y */
}

/* ---------------- drawing primitives ---------------- */
function line(x1,y1,x2,y2,col,w,dash){
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=w||1;
  if(dash) ctx.setLineDash(dash);
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  ctx.restore();
}
function poly(pts,col,w,dash,frac){
  var n=pts.length; if(frac!==undefined) n=Math.max(2,Math.round(n*frac));
  ctx.save(); ctx.strokeStyle=col; ctx.lineWidth=w||1;
  if(dash) ctx.setLineDash(dash);
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  for(var i=1;i<n;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke(); ctx.restore();
  return pts[n-1];
}
function dot(x,y,r,col,hollow){
  ctx.save(); ctx.beginPath(); ctx.arc(x,y,r,0,6.2832);
  if(hollow){ ctx.strokeStyle=col; ctx.lineWidth=1.4;
    ctx.fillStyle=PAPER; ctx.fill(); ctx.stroke(); }
  else { ctx.fillStyle=col; ctx.fill(); }
  ctx.restore();
}
function text(str,x,y,size,col,align,track){
  ctx.save(); ctx.fillStyle=col||INK;
  ctx.font=(size||10)+'px "Avenir Next","Futura","Century Gothic",sans-serif';
  ctx.textAlign=align||'left'; ctx.textBaseline='alphabetic';
  if(track){ str=str.split('').join('\u200a'); }
  ctx.fillText(str,x,y); ctx.restore();
}
function cap(str,x,y,size,col,align){ /* tracked small caps */
  ctx.save(); ctx.fillStyle=col||inkA(.62);
  ctx.font='600 '+(size||9)+'px "Avenir Next","Futura","Century Gothic",sans-serif';
  ctx.textAlign=align||'left';
  ctx.fillText(str.toUpperCase().split('').join('\u2009'),x,y); ctx.restore();
}
function clipRect(x,y,w,h){ ctx.save(); ctx.beginPath();
  ctx.rect(x,y,w,h); ctx.clip(); }

/* ---------------- render ---------------- */
function corners(){ return [
  {x: S.halfW, y: S.halfH}, {x:-S.halfW, y: S.halfH},
  {x: S.halfW, y:-S.halfH}, {x:-S.halfW, y:-S.halfH} ]; }

function draw(){
  var k=L.k;
  ctx.clearRect(0,0,L.W,L.H);

  /* faint sheet frame + quadrant rules */
  ctx.strokeStyle=inkA(.28); ctx.lineWidth=1;
  ctx.strokeRect(6,6,L.W-12,L.H-12);
  line(6,L.rowY,L.W-6,L.rowY,inkA(.18),1);
  line(L.colX,6,L.colX,L.H-6,inkA(.18),1);

  /* 45-degree transfer diagonal */
  line(L.colX,L.rowY, L.colX+774*k, L.rowY-774*k, inkA(.5),1);
  cap('45\u00b0 transfer', L.colX+16, L.rowY-756*k+18, 9, inkA(.45));

  drawPlan(); drawSide(); drawConstruction();
  drawTitleBlock();

  /* trace apparatus crosses quadrants — drawn unclipped, last */
  if(S.showTrace) drawTrace();
}

/* ---- PLAN (top-left): x horizontal, z increasing upward ---- */
function drawPlan(){
  clipRect(6,6,L.colX-6,L.rowY-6);
  var fx=L.fx, fz=L.fzP;
  cap('plan \u2014 top view', 14, 24, 9);

  /* picture plane */
  line(10,fz(S.c),L.colX-10,fz(S.c),YEL,2.4);
  cap('picture plane', 14, fz(S.c)-6, 8, YEL);

  /* room footprint + x-grid + z-stations */
  var xg, z;
  ctx.strokeStyle=inkA(.85); ctx.lineWidth=1.1;
  ctx.strokeRect(fx(-S.halfW),fz(S.far),fx(S.halfW)-fx(-S.halfW),fz(S.near)-fz(S.far));
  if(S.showGrid){
    for(xg=-S.halfW;xg<=S.halfW;xg+=50)
      line(fx(xg),fz(S.near),fx(xg),fz(S.far),inkA(.3),.7);
    for(z=S.near;z<=S.far+1;z+=60)
      line(fx(-S.halfW),fz(z),fx(S.halfW),fz(z),inkA(.3),.7);
  }

  /* ghost normal: the z-axis */
  if(S.showAsym) line(fx(0),fz(-40),fx(0),fz(S.far+30),'rgba(122,63,168,.5)',1,[2,5]);

  /* sight pencil: room corners -> RED point, extended to screen if beyond */
  var zEnd=Math.min(S.c,S.Zv), xs=[-S.halfW,S.halfW], zs=[S.near,S.far], i,j;
  for(i=0;i<2;i++) for(j=0;j<2;j++){
    var xe = xs[i]*(zEnd-S.Zv)/(zs[j]-S.Zv);
    line(fx(xs[i]),fz(zs[j]),fx(xe),fz(zEnd),redA(.3),.8);
  }

  /* blue slit edge-on, red slit as point */
  line(fx(-62),fz(S.Zh),fx(62),fz(S.Zh),BLUE,3);
  cap('blue slit \u00b7 edge', fx(66)+2, fz(S.Zh)+3, 8, BLUE);
  dot(fx(0),fz(S.Zv),4.6,RED);
  cap('point view of red slit', fx(8), fz(S.Zv)+13, 8, RED);

  /* pinhole comparison eye */
  if(S.showPin) dot(fx(0),fz((S.Zv+S.Zh)/2),3.6,ORG,true);
  ctx.restore();
}

/* ---- SIDE (bottom-right): z rightward, y upward ---- */
function drawSide(){
  clipRect(L.colX+1,L.rowY+1,L.W-L.colX-7,L.H-L.rowY-7);
  var fz=L.fzS, fy=L.fy;
  cap('side view \u2014 elevation', L.W-14, L.rowY+22, 9, inkA(.62),'right');

  line(fz(S.c),L.rowY+8,fz(S.c),L.H-10,YEL,2.4);
  cap('picture plane', fz(S.c)+5, L.H-14, 8, YEL);

  ctx.strokeStyle=inkA(.85); ctx.lineWidth=1.1;
  ctx.strokeRect(fz(S.near),fy(S.halfH),fz(S.far)-fz(S.near),fy(-S.halfH)-fy(S.halfH));
  var yg,z;
  if(S.showGrid){
    for(yg=-S.halfH;yg<=S.halfH;yg+=50)
      line(fz(S.near),fy(yg),fz(S.far),fy(yg),inkA(.3),.7);
    for(z=S.near;z<=S.far+1;z+=60)
      line(fz(z),fy(-S.halfH),fz(z),fy(S.halfH),inkA(.3),.7);
  }

  if(S.showAsym){
    line(fz(-40),fy(0),fz(S.far+30),fy(0),'rgba(122,63,168,.5)',1,[2,5]);
    cap('ghost normal', fz(S.far-90), fy(0)-6, 8, PUR);
  }

  var zEnd=Math.min(S.c,S.Zh), ys=[-S.halfH,S.halfH], zs=[S.near,S.far], i,j;
  for(i=0;i<2;i++) for(j=0;j<2;j++){
    var ye = ys[i]*(zEnd-S.Zh)/(zs[j]-S.Zh);
    line(fz(zs[j]),fy(ys[i]),fz(zEnd),fy(ye),bluA(.3),.8);
  }

  line(fz(S.Zv),fy(-62),fz(S.Zv),fy(62),RED,3);
  cap('red slit \u00b7 edge', fz(S.Zv)-4, fy(66)+14, 8, RED, 'right');
  dot(fz(S.Zh),fy(0),4.6,BLUE);
  cap('point view of blue slit', fz(S.Zh)+8, fy(-10)+3, 8, BLUE);

  if(S.showPin) dot(fz((S.Zv+S.Zh)/2),fy(0),3.6,ORG,true);
  ctx.restore();
}

/* ---- CONSTRUCTION (bottom-left): the cross-slit image ---- */
function drawConstruction(){
  clipRect(6,L.rowY+1,L.colX-6,L.H-L.rowY-7);
  var fx=L.fx, fy=L.fy, i, xg, yg, z;
  cap('construction \u00b7 cross-slit projection', 14, L.H-14, 9);

  /* stations: straight rectangles (Thm 3, degenerate cases) */
  for(z=S.near; z<=S.far+1; z+=60){
    var a=proj({x:-S.halfW,y: S.halfH,z:z}), b=proj({x:S.halfW,y:-S.halfH,z:z});
    ctx.strokeStyle=inkA(z===S.near||z>S.far-1?.85:.4);
    ctx.lineWidth=(z===S.near||z>S.far-1)?1.2:.7;
    ctx.strokeRect(fx(a.X),fy(a.Y),fx(b.X)-fx(a.X),fy(b.Y)-fy(a.Y));
  }
  /* longitudinal grid: Mobius curves (Thm 3, bowing) */
  var N=48, sweepFrac = S.sweep||S.sweepDone ? S.sweepU : 1;
  if(S.showGrid){
    for(xg=-S.halfW;xg<=S.halfW;xg+=50) for(i=0;i<2;i++){
      var cA=depthCurve(xg, i? S.halfH:-S.halfH, S.near,S.far,N)
        .map(function(p){return [fx(p.X),fy(p.Y)];});
      poly(cA,inkA(.35),.7);
    }
    for(yg=-S.halfH+50; yg<=S.halfH-50+1; yg+=50) for(i=0;i<2;i++){
      var cB=depthCurve(i? S.halfW:-S.halfW, yg, S.near,S.far,N)
        .map(function(p){return [fx(p.X),fy(p.Y)];});
      poly(cB,inkA(.35),.7);
    }
  }
  /* four corner depth curves — the signature strokes */
  corners().forEach(function(cn){
    var pts=depthCurve(cn.x,cn.y,S.near,S.far,N)
      .map(function(p){return [fx(p.X),fy(p.Y)];});
    if(sweepFrac<1) poly(pts,inkA(.18),1.6);          /* pencil-in */
    var tip=poly(pts,INK,1.7,null,sweepFrac);          /* ink pass  */
    if(S.sweep && sweepFrac<1) dot(tip[0],tip[1],2.6,INK);
  });

  /* pinhole comparison: straight one-point depth lines */
  if(S.showPin){
    corners().forEach(function(cn){
      var a=projPin({x:cn.x,y:cn.y,z:S.near}), b=projPin({x:cn.x,y:cn.y,z:S.far});
      line(fx(a.X),fy(a.Y),fx(b.X),fy(b.Y),ORG,1.2);
    });
    var pa=projPin({x:-S.halfW,y:S.halfH,z:S.near}),
        pb=projPin({x:S.halfW,y:-S.halfH,z:S.near});
    ctx.save(); ctx.strokeStyle=ORG; ctx.lineWidth=.9; ctx.setLineDash([4,3]);
    ctx.strokeRect(fx(pa.X),fy(pa.Y),fx(pb.X)-fx(pa.X),fy(pb.Y)-fy(pa.Y));
    ctx.restore();
    cap('one-point \u00b7 eye at (Zv+Zh)/2', 14, L.rowY+22, 8, ORG);
  }

  /* ghost-normal point + asymptote diagonals */
  if(S.showAsym){
    var m=(S.halfH/S.halfW)*(S.Zh/S.Zv), ext=150;
    line(fx(-ext),fy(-ext*m),fx(ext),fy(ext*m),'rgba(122,63,168,.55)',1,[2,5]);
    line(fx(-ext),fy( ext*m),fx(ext),fy(-ext*m),'rgba(122,63,168,.55)',1,[2,5]);
    dot(fx(0),fy(0),2.6,PUR);
    cap('(y/x)\u00b7Zh/Zv', fx(46), fy(46*m)-5, 8, PUR);
  }

  /* A_ij address labels, colored subscripts (red = vertical index,
     blue = horizontal index), following the page-12 convention   */
  if(S.showLab) corners().forEach(function(cn){
    var p=proj({x:cn.x,y:cn.y,z:S.near});
    var ix = p.X>0 ? '2':'1', iy = p.Y>0 ? '2':'1';
    var lx=fx(p.X)+(p.X>0? 6:-6), ly=fy(p.Y)+(p.Y>0? -8:16);
    ctx.save();
    ctx.textAlign = p.X>0?'left':'right';
    ctx.font='600 12px "Avenir Next","Futura",sans-serif';
    ctx.fillStyle=INK;
    var ax = lx + (p.X>0?0:-14);
    ctx.fillText('A', ax, ly);
    ctx.font='600 8.5px "Avenir Next","Futura",sans-serif';
    ctx.fillStyle=RED;  ctx.textAlign='left'; ctx.fillText(iy, ax+9, ly+3);
    ctx.fillStyle=BLUE; ctx.fillText(ix, ax+14, ly+3);
    ctx.restore();
  });

  cap('in plan the red slit is a pinhole at Zv \u00b7 in elevation the blue slit is a pinhole at Zh',
      14, L.rowY+36, 7.5, inkA(.55));
  ctx.restore();
}

/* ---- TRACE: the full four-quadrant construction for one point ---- */
function drawTrace(){
  var t=S.trace, fx=L.fx, fzP=L.fzP, fzS=L.fzS, fy=L.fy;
  var p=proj(t);
  /* plan sight line to red point / screen */
  var zEndP=Math.min(S.c,S.Zv), xe=t.x*(zEndP-S.Zv)/(t.z-S.Zv);
  line(fx(t.x),fzP(t.z),fx(xe),fzP(zEndP),RED,1.5);
  dot(fx(p.X),fzP(S.c),2.4,YEL); dot(fx(p.X),fzP(S.c),1.1,INK);
  /* side sight line to blue point / screen */
  var zEndS=Math.min(S.c,S.Zh), ye=t.y*(zEndS-S.Zh)/(t.z-S.Zh);
  line(fzS(t.z),fy(t.y),fzS(zEndS),fy(ye),BLUE,1.5);
  dot(fzS(S.c),fy(p.Y),2.4,YEL); dot(fzS(S.c),fy(p.Y),1.1,INK);
  /* drop + carry into the construction */
  line(fx(p.X),fzP(S.c),fx(p.X),fy(p.Y),inkA(.55),1,[5,4]);
  line(fzS(S.c),fy(p.Y),fx(p.X),fy(p.Y),inkA(.55),1,[5,4]);
  dot(fx(p.X),fy(p.Y),3.4,INK);
  line(fx(p.X)-8,fy(p.Y),fx(p.X)+8,fy(p.Y),INK,.8);
  line(fx(p.X),fy(p.Y)-8,fx(p.X),fy(p.Y)+8,INK,.8);
  /* 45-degree z transfer: plan point -> diagonal -> side point */
  line(fx(t.x),fzP(t.z),fzS(t.z),fzP(t.z),inkA(.35),1,[3,5]);
  line(fzS(t.z),fzP(t.z),fzS(t.z),fy(t.y),inkA(.35),1,[3,5]);
  dot(fzS(t.z),fzP(t.z),2,INK,true);
  /* handles */
  dot(fx(t.x),fzP(t.z),5,INK,true); dot(fx(t.x),fzP(t.z),1.8,INK);
  dot(fzS(t.z),fy(t.y),5,INK,true); dot(fzS(t.z),fy(t.y),1.8,INK);
}

/* ---- title block, in the empty half below the diagonal ---- */
function drawTitleBlock(){
  var k=L.k, w=252, h=118, x=L.colX+18, y=L.rowY-h-16;
  ctx.save();
  ctx.strokeStyle=inkA(.7); ctx.lineWidth=1; ctx.strokeRect(x,y,w,h);
  line(x,y+22,x+w,y+22,inkA(.7),1);
  line(x,y+h-24,x+w,y+h-24,inkA(.7),1);
  cap('tetra engine \u00b7 double-slit project', x+10, y+15, 9, INK);
  text('SHEET 35 \u00b7 CROSS-SLIT CONSTRUCTION', x+10, y+40, 11, INK);
  cap('plan \u00b7 elevation \u00b7 image \u2014 D5 \u00b7 Thm 3 \u00b7 Thm 7 \u00b7 Thm 8',
      x+10, y+56, 7.5, inkA(.6));
  var z0=S.near, AR=TM.crossRatio(S.Zv,S.Zh,S.c,z0);
  var dev=bowDeviation();
  ctx.font='10px ui-monospace,Menlo,monospace'; ctx.fillStyle=INK;
  ctx.fillText('Zv '+S.Zv.toFixed(0)+'   Zh '+S.Zh.toFixed(0)+
               '   screen '+S.c.toFixed(0), x+10, y+74);
  ctx.fillText('AR(near) = (Zv,Zh;c,z) = '+AR.toFixed(4), x+10, y+88);
  cap('two boards \u00b7 two eyes \u2014 bow '+dev.toFixed(1)+' u',
      x+10, y+h-9, 8, inkA(.6));
  ctx.restore();
}
function bowDeviation(){
  var pts=depthCurve(S.halfW,S.halfH,S.near,S.far,33);
  var a=pts[0], b=pts[pts.length-1];
  var dx=b.X-a.X, dy=b.Y-a.Y, Lc=Math.hypot(dx,dy)||1, m=0;
  pts.forEach(function(p){
    var d=Math.abs(dx*(p.Y-a.Y)-dy*(p.X-a.X))/Lc; if(d>m)m=d; });
  return m;
}

/* ---------------- interaction ---------------- */
var drag=null;
function hits(px,py){
  var fx=L.fx, fzP=L.fzP, fzS=L.fzS, fy=L.fy, t=S.trace, R=17;
  var H=[
    {id:'traceP', x:fx(t.x),   y:fzP(t.z)},
    {id:'traceS', x:fzS(t.z),  y:fy(t.y)},
    {id:'redP',   x:fx(0),     y:fzP(S.Zv)},
    {id:'blueS',  x:fzS(S.Zh), y:fy(0)}
  ];
  for(var i=0;i<H.length;i++)
    if(Math.hypot(px-H[i].x,py-H[i].y)<R) return {id:H[i].id};
  if(px<L.colX && Math.abs(py-fzP(S.c))<10)  return {id:'yelP'};
  if(px>L.colX && Math.abs(px-fzS(S.c))<10 && py>L.rowY) return {id:'yelS'};
  if(px>L.colX && Math.abs(px-fzS(S.Zv))<9 && py>L.rowY) return {id:'redS'};
  if(px<L.colX && Math.abs(py-fzP(S.Zh))<9 && py<L.rowY) return {id:'blueP'};
  return null;
}
function clampAll(){
  S.Zv=Math.min(Math.max(S.Zv,60),330-0.5);
  S.Zh=Math.min(Math.max(S.Zh,S.Zv+0.5),330);
  S.near=Math.max(S.near,S.Zh+90);
  S.far=Math.max(S.far,S.near+60);
  S.c=Math.min(Math.max(S.c,-50),S.near-40);
  if(Math.abs(S.c-S.Zv)<3) S.c=S.Zv+(S.c>=S.Zv?3:-3);
  if(Math.abs(S.c-S.Zh)<3) S.c=S.Zh+(S.c>=S.Zh?3:-3);
  S.trace.z=Math.min(Math.max(S.trace.z,S.near),S.far);
  S.trace.x=Math.min(Math.max(S.trace.x,-S.halfW),S.halfW);
  S.trace.y=Math.min(Math.max(S.trace.y,-S.halfH),S.halfH);
  syncSliders();
}
function invPlan(px,py){ return {x:px/L.k-150, z:(L.rowY-py)/L.k-60}; }
function invSide(px,py){ return {z:(px-L.colX)/L.k-60, y:150-(py-L.rowY)/L.k}; }
cv.addEventListener('pointerdown',function(e){
  var r=cv.getBoundingClientRect(), px=e.clientX-r.left, py=e.clientY-r.top;
  drag=hits(px,py); if(drag){ cv.setPointerCapture(e.pointerId); }
});
cv.addEventListener('pointermove',function(e){
  if(!drag) return;
  var r=cv.getBoundingClientRect(), px=e.clientX-r.left, py=e.clientY-r.top;
  var P=invPlan(px,py), Q=invSide(px,py);
  switch(drag.id){
    case 'traceP': S.trace.x=P.x; S.trace.z=P.z; break;
    case 'traceS': S.trace.y=Q.y; S.trace.z=Q.z; break;
    case 'redP':  S.Zv=P.z; break;
    case 'redS':  S.Zv=Q.z; break;
    case 'blueP': S.Zh=P.z; break;
    case 'blueS': S.Zh=Q.z; break;
    case 'yelP':  S.c=P.z;  break;
    case 'yelS':  S.c=Q.z;  break;
  }
  clampAll(); needsDraw=true;
});
cv.addEventListener('pointerup',function(){ drag=null; });

/* ---------------- tray wiring ---------------- */
function $(id){ return document.getElementById(id); }
var sliders=[['sZv','Zv'],['sZh','Zh'],['sC','c'],['sNear','near'],['sFar','far']];
sliders.forEach(function(sv){
  $(sv[0]).addEventListener('input',function(){
    S[sv[1]]=parseFloat(this.value); clampAll(); needsDraw=true; });
});
function syncSliders(){
  $('sZv').value=S.Zv; $('vZv').textContent=S.Zv.toFixed(0);
  $('sZh').value=S.Zh; $('vZh').textContent=S.Zh.toFixed(0);
  $('sZh').min=(S.Zv+1).toFixed(0);
  $('sC').value=S.c;   $('vC').textContent=S.c.toFixed(0);
  $('sNear').value=S.near; $('vNear').textContent=S.near.toFixed(0);
  $('sFar').value=S.far;  $('vFar').textContent=S.far.toFixed(0);
  var AR=TM.crossRatio(S.Zv,S.Zh,S.c,S.near);
  $('readout').innerHTML='AR(near) <b>'+AR.toFixed(4)+
    '</b> &nbsp; bow <b>'+bowDeviation().toFixed(1)+' u</b>';
}
function chip(id,key,cb){
  $(id).addEventListener('click',function(){
    S[key]=!S[key]; this.setAttribute('aria-pressed',S[key]);
    if(cb)cb(); needsDraw=true; });
}
chip('cTrace','showTrace'); chip('cPin','showPin');
chip('cAsym','showAsym');   chip('cLab','showLab'); chip('cGrid','showGrid');
$('cSweep').addEventListener('click',function(){
  S.sweep=!S.sweep; this.setAttribute('aria-pressed',S.sweep);
  if(S.sweep){ S.sweepU=reduceMotion?1:0; S.sweepDone=false; }
  else { S.sweepU=1; S.sweepDone=false; }
  needsDraw=true;
});

/* ---------------- loop ---------------- */
var needsDraw=true;
function tick(){
  if(S.sweep && S.sweepU<1){ S.sweepU=Math.min(1,S.sweepU+0.007); needsDraw=true;
    if(S.sweepU>=1){ S.sweep=false; S.sweepDone=false;
      $('cSweep').setAttribute('aria-pressed','false'); } }
  if(needsDraw){ draw(); needsDraw=false; }
  requestAnimationFrame(tick);
}
function onResize(){ layout(); clampAll(); needsDraw=true; }
window.addEventListener('resize',onResize);
layout(); clampAll(); needsDraw=true;
if (typeof requestAnimationFrame==='function') tick(); else draw();
})();
</script>
